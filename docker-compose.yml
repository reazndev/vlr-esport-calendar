services:
  api:
    image: ghcr.io/reazndev/vlr-esport-calendar-api:prod
    container_name: vlr-esport-calendar-api
    environment:
      PORT: "3030"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:8050}"
      VLR_API_BASE_URL: "https://vlrggapi.vercel.app"
      CACHE_TTL_MS: "300000"
      CATALOG_CACHE_TTL_MS: "1800000"
      UPCOMING_PAGES: "3"
      EVENT_PAGES: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3030/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ghcr.io/reazndev/vlr-esport-calendar-web:prod
    container_name: vlr-esport-calendar-web
    ports:
      - "${WEB_PORT:-8050}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
